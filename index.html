<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="misbar21 - Premium video streaming platform with the best user interface experience. Watch unlimited videos and enjoy stunning visuals.">
    <meta name="keywords" content="streaming, video, watch, premium, adult, amateur">
    <meta property="og:title" content="misbar21 - Premium Streaming Experience">
    <meta property="og:description" content="Stream videos with the best design and easy navigation.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <title>misbar21 - Premium Video Streaming</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navbar / Header -->
    <header class="navbar">
        <a href="index.html" class="logo">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--primary-color)">
                <polygon points="5 3 19 12 5 21 5 3"></polygon>
            </svg>
            misbar<span>21</span>
        </a>
        <div class="search-bar">
            <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <input type="text" id="searchInput" placeholder="Search videos, models, or categories...">
        </div>
    </header>

    <!-- Main ContentArea -->
    <main class="container">

        <!-- Category Filter Area -->
        <nav aria-label="Video Categories" class="category-filters" id="categoryFilters">
            <!-- Category chips loaded by app.js -->
        </nav>

        <!-- Video Grid Display -->
        <section class="video-grid" id="videoGrid">
            <!-- Video cards rendered by app.js -->
        </section>
        
        <!-- Pagination Controls -->
        <nav aria-label="Page Navigation" class="pagination" id="pagination">
            <!-- Pagination buttons appear here -->
        </nav>
    </main>

    <!-- Footer SEO text -->
    <footer style="text-align: center; padding: 2rem; color: var(--text-muted); font-size: 0.8rem; margin-top: 2rem; border-top: 1px solid var(--glass-border);">
        <p>&copy; 2026 misbar21 Premium Platform. All Rights Reserved.</p>
    </footer>

    <!-- Scripts -->
    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
