<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="misbarXI - Premium video streaming platform with the best user interface experience. Watch unlimited videos and enjoy stunning visuals.">
    <meta name="keywords" content="streaming, video, watch, premium, adult, asian">
    <meta property="og:title" content="misbarXI - Premium Streaming Experience">
    <meta property="og:description" content="Stream videos with the best design and easy navigation.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <title>misbarXI - Premium Video Streaming</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <script async src="https://js.wpadmngr.com/static/adManager.js" data-admpid="422181"></script>
    <!-- Navbar / Header -->
    <header class="navbar">
        <a href="index.html" class="logo">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--primary-color)">
                <polygon points="5 3 19 12 5 21 5 3"></polygon>
            </svg>
            misbar<span>XI</span>
        </a>
        <div class="search-bar">
            <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <input type="text" id="searchInput" placeholder="Search videos, models, or categories...">
        </div>
    </header>

    <!-- Header Ad -->
    <div class="ad-container ad-header">
        <div class="ad-placeholder ad-720x90">Ad 720x90</div>
    </div>

    <!-- Main ContentArea -->
    <main class="container">
        <div class="layout-wrapper">
            <!-- Left Sidebar -->
            <aside class="sidebar sidebar-left">
                <div class="sidebar-widget">
                    <h3 class="widget-title">Categories</h3>
                    <nav aria-label="Video Categories" class="category-filters-vertical" id="categoryFilters">
                        <!-- Category chips loaded by app.js -->
                    </nav>
                </div>
                <div class="sidebar-widget">
                    <h3 class="widget-title">Labels</h3>
                    <div class="label-list">
                        <span class="label-item">Adult</span>
                        <span class="label-item">Asian</span>
                    </div>
                </div>
            </aside>

            <!-- Main Video Content -->
            <section class="main-content">
                <!-- Video Grid Display -->
                <div class="video-grid" id="videoGrid">
                    <!-- Video cards rendered by app.js -->
                </div>
                
                <!-- Pagination Controls -->
                <nav aria-label="Page Navigation" class="pagination" id="pagination">
                    <!-- Pagination buttons appear here -->
                </nav>
            </section>

            <!-- Right Sidebar for Ads -->
            <aside class="sidebar sidebar-right">
                <div class="sidebar-widget">
                    <div class="ad-container ad-sidebar">
                        <div class="ad-placeholder ad-300x250">Ad 300x250</div>
                    </div>
                </div>
            </aside>
        </div>
    </main>

    <!-- Footer Ad -->
    <div class="ad-container ad-footer">
        <div class="ad-placeholder ad-720x90">Ad 720x90</div>
    </div>

    <!-- Footer SEO text -->
    <footer style="text-align: center; padding: 2rem; color: var(--text-muted); font-size: 0.8rem; margin-top: 2rem; border-top: 1px solid var(--glass-border);">
        <p>&copy; 2026 misbarXI Premium Platform. All Rights Reserved.</p>
    </footer>

    <!-- Scripts -->
    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
