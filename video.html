<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Watch premium videos on misbarXI.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script async src="https://js.wpadmngr.com/static/adManager.js" data-admpid="421727"></script>
    <title>Loading Video... - misbarXI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <script async src="https://js.wpadmngr.com/static/adManager.js" data-admpid="422181"></script>
    <header class="navbar">
        <a href="index.html" class="logo">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--primary-color)">
                <polygon points="5 3 19 12 5 21 5 3"></polygon>
            </svg>
            misbar<span>XI</span>
        </a>
    </header>

    <!-- Header Ad -->
    <div class="ad-container ad-header">
        <div class="ad-placeholder ad-720x90">Ad 720x90</div>
    </div>

    <main class="container">
        <div class="layout-wrapper">
            <!-- Left Sidebar -->
            <aside class="sidebar sidebar-left">
                <div class="sidebar-widget">
                    <h3 class="widget-title">Categories</h3>
                    <nav aria-label="Video Categories" class="category-filters-vertical" id="categoryFilters">
                        <!-- Category chips loaded by app.js -->
                    </nav>
                </div>
                <div class="sidebar-widget">
                    <h3 class="widget-title">Labels</h3>
                    <div class="label-list">
                        <span class="label-item">Adult</span>
                        <span class="label-item">Asian</span>
                    </div>
                </div>
            </aside>

            <!-- Main Video Content -->
            <section class="main-content video-player-container">
                <a href="index.html" class="back-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                    Back to Home
                </a>
                
                <!-- Video Player -->
                <article class="player-wrapper" id="playerArea">
                    <!-- Iframe dimuat melalui app.js -->
                </article>

                <!-- Video Metadata -->
                <section class="video-details">
                    <h1 id="videoTitle">Loading video title...</h1>
                    <div id="videoMeta" class="video-details-meta">
                        <!-- Meta data seperti tanggal dan kategori -->
                    </div>
                    <div id="videoTags" class="tag-list">
                        <!-- Tags video -->
                    </div>
                </section>

                <!-- Related Videos Section -->
                <section class="related-videos">
                    <h2 class="section-title">Related Videos</h2>
                    <div class="video-grid" id="relatedGrid">
                        <!-- Related video cards loaded by app.js -->
                    </div>
                </section>
            </section>

            <!-- Right Sidebar for Ads -->
            <aside class="sidebar sidebar-right">
                <div class="sidebar-widget">
                    <div class="ad-container ad-sidebar">
                        <div class="ad-placeholder ad-300x250"><div data-banner-id="1479815"></div></div>
                    </div>
                </div>
            </aside>
        </div>
    </main>
    
    <!-- Footer Ad -->
    <div class="ad-container ad-footer">
        <div class="ad-placeholder ad-720x90">Ad 720x90</div>
    </div>

    <footer style="text-align: center; padding: 2rem; color: var(--text-muted); font-size: 0.8rem; margin-top: 2rem; border-top: 1px solid var(--glass-border);">
        <p>&copy; 2026 misbarXI Premium Platform. All Rights Reserved.</p>
    </footer>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
